name: Telegram Due Worker

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  run-due:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scheduler
        run: |
          curl -sS -X POST "https://classey-personal-tracker.vercel.app/api/telegram/scheduler" \
            -H "Content-Type: application/json" \
            -H "x-scheduler-token: ${{ secrets.SCHEDULER_SECRET }}" \
            -d '{"action":"run-due"}'